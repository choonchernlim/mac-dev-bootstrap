---
- name: Mac Dev Bootstrap
  hosts: all
  vars:
    playbook_retries: 10
    playbook_delay: 3
  roles:
    # --------------------------------------------------------------------------
    # Tools to install/configure
    # --------------------------------------------------------------------------
    - {role: mac, tags: [mac, personal, work]}
    - {role: xcode, tags: [xcode, personal, work]}
    # - {role: homebrew_common, tags: [homebrew, personal, work]}  # disabled: managed by Nix (dotfiles repo)
    # - {role: homebrew_personal, tags: [personal]}  # disabled: managed by Nix (dotfiles repo)
    # - {role: homebrew_work, tags: [work]}  # disabled: managed by Nix (dotfiles repo)
    - {role: python, tags: [python, personal, work]}
    - {role: quicklook, tags: [quicklook, personal, work]}
    # - {role: ohmyzsh, tags: [ohmyzsh, sdkman, nvm, gcloud, personal, work]}  # disabled: zsh/prompt now managed by Nix (dotfiles repo)
    # - {role: sdkman, tags: [sdkman, personal, work]}  # disabled: java/sdkman dropped; version management via mise (dotfiles repo)
    - {role: iterm2, tags: [iterm2, personal, work]}
    - {role: ghostty, tags: [ghostty, personal, work]}
    # - {role: nvm, tags: [nvm, personal, work]}  # disabled: node now managed by mise (dotfiles repo)
    - {role: vimrc, tags: [vimrc, personal, work]}
    # - {role: gcloud, tags: [gcloud, personal, work]}  # disabled: gcloud config/components/completions managed by Nix (dotfiles repo)
    # - {role: ai, tags: [ai, personal, work]}  # disabled: AI configs now managed by Nix (dotfiles repo)
    # --------------------------------------------------------------------------
    # Post installation
    # --------------------------------------------------------------------------
    - {role: cleanup, tags: [cleanup, personal, work]}
    # --------------------------------------------------------------------------
    # For debugging purpose
    # --------------------------------------------------------------------------
    - {role: debug, tags: [never, debug]}
