---
- name: Ensure AI tool config directory exists
  ansible.builtin.file:
    path: "{{ item.dir }}"
    state: directory
    mode: '0755'
  loop: "{{ ai_targets }}"

- name: Copy INSTRUCTIONS.md to AI tool config
  ansible.builtin.copy:
    src: INSTRUCTIONS.md
    dest: "{{ item.dir }}/{{ item.filename }}"
    mode: '0644'
  loop: "{{ ai_targets }}"

- name: Ensure AI tool skills directory exists
  ansible.builtin.file:
    path: "{{ item.dir }}/skills"
    state: directory
    mode: '0755'
  loop: "{{ ai_targets }}"

- name: Copy skills to AI tool config
  ansible.builtin.copy:
    src: skills/
    dest: "{{ item.dir }}/skills/"
    mode: '0644'
    directory_mode: '0755'
  loop: "{{ ai_targets }}"

# ── Claude plugins ──────────────────────────────────────────────────────────

- name: Check claude CLI present
  ansible.builtin.command: which claude
  register: ai_claude_cli
  changed_when: false
  failed_when: false

- name: List Claude marketplaces
  ansible.builtin.command: claude plugin marketplace list
  register: ai_claude_marketplaces
  changed_when: false
  when: ai_claude_cli.rc == 0

- name: Add Claude plugin marketplace
  ansible.builtin.command: claude plugin marketplace add {{ ai_plugins_claude_marketplace.source }}
  changed_when: true
  when:
    - ai_claude_cli.rc == 0
    - ai_plugins_claude_marketplace.name not in ai_claude_marketplaces.stdout

- name: Install Claude plugins
  ansible.builtin.command: claude plugin install {{ item }}@{{ ai_plugins_claude_marketplace.name }}
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.claude/plugins/cache/{{ ai_plugins_claude_marketplace.name }}/{{ item }}"
  loop: "{{ ai_plugins_claude }}"
  when: ai_claude_cli.rc == 0

# ── Antigravity extensions ───────────────────────────────────────────────────

- name: Check antigravity-cli present
  ansible.builtin.command: which agy
  register: ai_antigravity_cli
  changed_when: false
  failed_when: false

- name: Install Antigravity extensions
  ansible.builtin.command: agy extensions install {{ item }} --consent --skip-settings
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.gemini/antigravity-cli/extensions/{{ item | basename }}"
  loop: "{{ ai_plugins_antigravity }}"
  when: ai_antigravity_cli.rc == 0

# ── Copilot plugins ──────────────────────────────────────────────────────────

- name: Check copilot CLI present
  ansible.builtin.command: which copilot
  register: ai_copilot_cli
  changed_when: false
  failed_when: false

- name: List Copilot marketplaces
  ansible.builtin.command: copilot plugin marketplace list
  register: ai_copilot_marketplaces
  changed_when: false
  when: ai_copilot_cli.rc == 0

- name: Add Copilot plugin marketplaces
  ansible.builtin.command: copilot plugin marketplace add {{ item.source }}
  changed_when: true
  loop: "{{ ai_plugins_copilot_marketplaces }}"
  when:
    - ai_copilot_cli.rc == 0
    - item.name not in ai_copilot_marketplaces.stdout

- name: Install Copilot plugins
  ansible.builtin.command: copilot plugin install {{ item.name }}@{{ item.marketplace }}
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.copilot/installed-plugins/{{ item.marketplace }}/{{ item.name }}"
  loop: "{{ ai_plugins_copilot }}"
  when: ai_copilot_cli.rc == 0

# ── Codex plugins ────────────────────────────────────────────────────────────

- name: Check codex CLI present
  ansible.builtin.command: which codex
  register: ai_codex_cli
  changed_when: false
  failed_when: false

- name: Install Codex plugins
  ansible.builtin.command: codex plugin install {{ item.name }}@{{ item.marketplace }}
  args:
    creates: "{{ ansible_facts['user_dir'] }}/.codex/plugins/{{ item.name }}"
  loop: "{{ ai_plugins_codex }}"
  when: ai_codex_cli.rc == 0
