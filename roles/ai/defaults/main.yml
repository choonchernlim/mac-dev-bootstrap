---
ai_skills_canonical_dir: '{{ ansible_facts["user_dir"] }}/.local/share/ai-skills'

ai_targets:
  - dir: '{{ ansible_facts["user_dir"] }}/.gemini/antigravity-cli'
    filename: ANTIGRAVITY.md
    settings_src: antigravity.json
  - dir: '{{ ansible_facts["user_dir"] }}/.claude'
    filename: CLAUDE.md
    settings_src: claude.json
  - dir: '{{ ansible_facts["user_dir"] }}/.copilot'
    filename: copilot-instructions.md
    settings_src: copilot.json
  - dir: '{{ ansible_facts["user_dir"] }}/.codex'
    filename: AGENTS.md

ai_plugins_claude_marketplace:
  name: claude-plugins-official
  source: anthropics/claude-plugins-official
ai_plugins_claude:
  - superpowers
  - frontend-design
  - code-simplifier
  - typescript-lsp
  - skill-creator
ai_plugins_claude_remove:
  - context7@claude-plugins-official
  - playwright@claude-plugins-official

ai_plugins_antigravity:
  - https://github.com/obra/superpowers

ai_plugins_copilot_marketplaces:
  - name: superpowers-marketplace
    source: obra/superpowers-marketplace
ai_plugins_copilot:
  - {name: superpowers, marketplace: superpowers-marketplace}

# TODO: verify marketplace source string after codex CLI is installed
ai_plugins_codex_marketplaces:
  - name: superpowers-marketplace
    source: obra/superpowers
ai_plugins_codex:
  - {name: superpowers, marketplace: superpowers-marketplace}
