---
- name: "Ensure {{ item.dir }} directory exists"
  ansible.builtin.file:
    path: "{{ item.dir }}"
    state: directory
    mode: '0755'
  loop: "{{ ai_instructions_targets }}"

- name: "Copy INSTRUCTIONS.md to {{ item.dir }}/{{ item.filename }}"
  ansible.builtin.copy:
    src: INSTRUCTIONS.md
    dest: "{{ item.dir }}/{{ item.filename }}"
    mode: '0644'
  loop: "{{ ai_instructions_targets }}"
