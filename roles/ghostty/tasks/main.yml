---
- name: Ensure Ghostty config directory exists
  ansible.builtin.file:
    path: '{{ ansible_facts["user_dir"] }}/.config/ghostty'
    state: directory
    mode: '0755'

- name: Copy Ghostty config
  ansible.builtin.copy:
    src: config
    dest: '{{ ansible_facts["user_dir"] }}/.config/ghostty/config'
    mode: '0644'
